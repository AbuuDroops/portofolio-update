<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <div id="loginForm" class="login-form">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <input type="password" id="password" placeholder="Password admin">
            <button onclick="login()">Masuk</button>
        </div>

        <div id="adminPanel" class="admin-panel" style="display:none;">
            <div class="admin-header">
                <h1>Admin Dashboard</h1>
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>

            <div class="admin-content">
                <!-- Form Tambah -->
                <div class="form-section">
                    <h3><i class="fas fa-plus"></i> Tambah Project</h3>
                    <form id="projectForm">
                        <input type="text" id="title" placeholder="Judul (Android RBAC App)" required>
                        <textarea id="desc" placeholder="Deskripsi project..." required></textarea>
                        <label>Gambar Screenshot:</label>
                        <input type="file" id="screenshotFile" accept="image/*">
                        <label>Logo:</label>
                        <input type="file" id="logoFile" accept="image/*">
                        <input type="text" id="tech" placeholder="Tech: Kotlin,Firebase,UML">
<input type="url" id="link" placeholder="Website URL (optional)">
                        <label>Download APK:</label>
                        <input type="url" id="downloadUrl" placeholder="APK URL (optional)">
                        <button type="submit"><i class="fas fa-save"></i> Simpan</button> 
                    </form>
                </div>

                <!-- List Projects -->
                <div class="list-section">
                    <h3><i class="fas fa-list"></i> Daftar Projects (<span id="count">0</span>)</h3>
                    <div id="projectList"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
